<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website-Ku</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #DADADA;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash-container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        .header-logo {
            background-color: #2D3250;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #676F9D;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
        }

        .dot-ani {
            animation: blink 1.4s infinite both;
        }

        .dot-ani:nth-child(2) { animation-delay: .2s; }
        .dot-ani:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="header-logo">Website-Ku</div>
        
        <div class="loader"></div>
        
        <p>Mohon tunggu sebentar, Anda akan diarahkan ke halaman utama<span class="dot-ani">.</span><span class="dot-ani">.</span><span class="dot-ani">.</span></p>
    </div>

    <script>
        
        setTimeout(function() {
            window.location.href = "test-signin.html";
        }, 3000);
    </script>

</body>
</html>
